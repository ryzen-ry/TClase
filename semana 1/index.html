<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Login - WineCheck</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card p-4" style="width: 380px;">
    <p class="text-center mb-3">bienvenidos a Wine Company</p>
    <img >
    <h3 class="text-center mb-3">Iniciar Sesión</h3>

    <div th:if="${param.success}" class="alert alert-success">Registro completado. Inicia sesión.</div>
    <div th:if="${param.submitted}" class="alert alert-success">Formulario enviado. Sesión cerrada.</div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input name="password" type="password" class="form-control" required/>
      </div>
      <button class="btn btn-primary w-100" type="submit">Ingresar</button>
    </form>
  </div>
</div>
</body>
</html>
